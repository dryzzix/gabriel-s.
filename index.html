<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de CPF Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <div class="icon-header">
            <i class="fas fa-id-card"></i>
        </div>
        <h1>Gerador de CPF</h1>
        <p>Gere números válidos para testes de software</p>

        <div class="display-container">
            <span id="cpf-resultado">000.000.000-00</span>
            <button class="btn-copy" onclick="copiarCPF()" title="Copiar">
                <i class="far fa-copy"></i>
            </button>
        </div>

        <button class="btn-generate" onclick="renderizarCPF()">
            <i class="fas fa-sync-alt"></i> Gerar Novo
        </button>
        
        <div id="toast" class="toast">Copiado!</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
